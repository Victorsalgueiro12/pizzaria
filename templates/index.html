    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>

    /* FUNDO PREMIUM */
    body {
        background: radial-gradient(circle at top, #1f1f1f 0%, #0f0f0f 60%);
        font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR GLASS */
    .navbar {
        background: rgba(20, 20, 20, 0.85);
        backdrop-filter: blur(12px);
        box-shadow: 
            0 10px 30px rgba(0,0,0,0.6),
            0 0 40px rgba(255,0,0,0.05);
        border-bottom: 1px solid rgba(255, 0, 0, 0.1);
    }

    /* CARDS GLASS */
    .glass-card {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        transition: all 0.4s ease;
    }

    .glass-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 
            0 25px 60px rgba(0,0,0,0.8),
            0 0 30px rgba(255,0,0,0.15);
    }

    /* TÍTULO CATEGORIA */
    .category-title {
        position: relative;
    }

    .category-title::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -8px;
        width: 60px;
        height: 3px;
        background: linear-gradient(to right, #ef4444, transparent);
    }

    /* ANIMAÇÃO */
    .fade-up {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    </style>

    </head>

    <body class="text-white min-h-screen">

    <!-- NAVBAR -->
    <header class="navbar sticky top-0 z-50 py-6">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-wide">
                🍕 <span class="text-red-500"> </span> Pizzaria & Sandubaria
            </h1>

            <span class="text-sm text-gray-400 tracking-widest uppercase">
                MELHOR DA REGIÃO
            </span>
        </div>
    </header>

    <!-- PRODUTOS -->
    <div class="max-w-6xl mx-auto px-6 pb-20" id="produtos"></div>

    <script src="/static/script.js"></script>
    <!-- BOTÃO FLUTUANTE CARRINHO -->
    <div id="cartButton" 
    class="fixed bottom-6 right-6 bg-red-500 hover:bg-red-600 
    w-16 h-16 rounded-full flex items-center justify-center 
    shadow-2xl shadow-red-500/40 cursor-pointer transition">

    <span class="text-white text-2xl">🛒</span>

    <span id="cartCount"
    class="absolute -top-2 -right-2 bg-white text-red-600 
    text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">
    0
    </span>
    </div>

    <!-- MODAL CARRINHO -->
    <div id="cartModal" 
    class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden 
    flex items-center justify-center z-50">

    <div class="bg-[#1c1c1c] w-full max-w-md rounded-3xl 
    shadow-2xl p-6 relative">

    <h2 class="text-2xl font-bold mb-6 text-red-500">
    Seu Carrinho
    </h2>

    <div id="cartItems" class="space-y-4 max-h-60 overflow-y-auto"></div>

    <div class="border-t border-gray-700 mt-6 pt-4 flex justify-between">
    <span class="font-semibold">Total:</span>
    <span id="cartTotal" class="text-red-500 font-bold text-lg">
    R$ 0.00
    </span>
    </div>
    <div class="mt-6 space-y-3">

    <input id="endereco" type="text" 
    placeholder="Digite seu endereço"
    class="w-full bg-black/40 border border-gray-700 p-3 rounded-xl text-sm">

    <select id="pagamento"
    class="w-full bg-black/40 border border-gray-700 p-3 rounded-xl text-sm">
    <option value="">Forma de pagamento</option>
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Cartão</option>
    </select>

    <textarea id="observacao"
    placeholder="Observação do pedido (opcional)"
    class="w-full bg-black/40 border border-gray-700 p-3 rounded-xl text-sm"></textarea>

    <button onclick="finalizarPedido()"
    class="w-full bg-green-600 hover:bg-green-700 transition 
    p-3 rounded-xl font-semibold mt-2">
    Finalizar Pedido
    </button>

    </div>
    <button id="closeCart"
    class="absolute top-4 right-4 text-gray-400 hover:text-white">
    ✕
    </button>

    </div>
    </div>
    </body>
    </html>
